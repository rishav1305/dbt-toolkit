# .dbt-toolkit/config.yaml
# Generated by dbt-toolkit setup wizard.
version: 1

project:
  name: "{{ project_name }}"
  dir: "."

execution:
  method: "{{ execution_method }}"  # local | ssh | docker
  # ssh:
  #   host: "example.com"
  #   user: "ubuntu"
  #   key: "~/.ssh/id_rsa"
  #   project_path: "/opt/dbt/project"
  #   venv: "dbt-env/bin/activate"
  #   env_vars:
  #     - "DBT_REDSHIFT_USER"
  #     - "DBT_REDSHIFT_PASSWORD"
  # docker:
  #   image: "ghcr.io/dbt-labs/dbt-redshift:latest"
  #   volumes: []

profile:
  name: "{{ profile_name }}"
  target: "{{ target }}"
  profiles_dir: null  # null = ~/.dbt (default)

defaults:
  threads: 4
  full_refresh: false
  fail_fast: false
  log_format: "json"

freshness:
  enabled: true
  warn_after_hours: 24
  tracked_sources: []  # Empty = all sources

audit:
  check_sort_dist: true
  check_undocumented: true
  check_test_coverage: true
  min_test_coverage: 0.8

tags:
  favorites: []  # Quick-access tags, e.g. ["daily", "wcbm_dashboard"]
